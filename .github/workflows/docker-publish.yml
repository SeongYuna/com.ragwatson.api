# .github/workflows/docker-publish.yml
#
# GitHub Actions 러너에서 backend 이미지를 빌드해 Docker Hub(seongyuna/backend)로 푸시한다.
# 로컬 디스크를 전혀 쓰지 않기 위한 용도 — main에 push되면 자동 실행된다.

name: Docker Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CUDA + torch(cu126) 이미지가 커서 기본 러너 디스크(~14GB)로 빠듯할 수 있어 사전 확보
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: seongyuna/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
