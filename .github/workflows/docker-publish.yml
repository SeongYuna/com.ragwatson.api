# .github/workflows/docker-publish.yml
#
# GitHub Actions 러너에서 backend 이미지를 빌드해 Docker Hub(seongyuna/backend)로 푸시한다.
# 로컬 디스크를 전혀 쓰지 않기 위한 용도 — main에 push되면 자동 실행된다.

name: Docker Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CUDA + torch(cu126) 이미지가 커서 기본 러너 디스크(~14GB)로 빠듯할 수 있어 사전 확보
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (러너에 로드만, 아직 push 안 함)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: seongyuna/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # push 전에 컨테이너를 실제로 띄우지 않고 import만 해봐서
      # ModuleNotFoundError 등 런타임 전 잡을 수 있는 오류를 조기 검출한다.
      - name: Import smoke test
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql+asyncpg://smoke:smoke@localhost:5432/smoke \
            -e TITANIC_DATABASE_URL=postgresql+asyncpg://smoke:smoke@localhost:5432/smoke \
            seongyuna/backend:latest python3.13 -c "import main"

      - name: Push to Docker Hub
        run: docker push seongyuna/backend:latest
